name: qbo-mcp-server

services:
  mcp:
    build:
      context: .
      target: runtime
    image: qbo-mcp-server:local
    init: true
    restart: unless-stopped
    ports:
      - target: 3000
        published: "${MCP_HOST_PORT:-3000}"
        host_ip: "${MCP_HOST_IP:-127.0.0.1}"
        protocol: tcp
    environment:
      NODE_ENV: production
      # The container always listens on 3000. MCP_HOST_PORT controls the host mapping.
      MCP_HTTP_PORT: "3000"

      # Used only when the caller omits X-QuickBooks-Environment.
      QUICKBOOKS_DEFAULT_ENVIRONMENT: "${QUICKBOOKS_DEFAULT_ENVIRONMENT:-sandbox}"
      MCP_CORS_ORIGIN: "${MCP_CORS_ORIGIN:-*}"

      QUICKBOOKS_DISABLE_WRITE: "${QUICKBOOKS_DISABLE_WRITE:-false}"
      QUICKBOOKS_DISABLE_UPDATE: "${QUICKBOOKS_DISABLE_UPDATE:-false}"
      QUICKBOOKS_DISABLE_DELETE: "${QUICKBOOKS_DISABLE_DELETE:-false}"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3000/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
    security_opt:
      - no-new-privileges:true
